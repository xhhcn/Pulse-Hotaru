name: Build Client Binaries

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/build-clients.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/build-clients.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for release (optional)'
        required: false
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'Tag name for release'
        required: false
        type: string

jobs:
  build:
    name: Build Clients
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # NOTE: We build the whole package (`.`) rather than `main.go`. The
      # client is split across multiple source files (main.go +
      # hwprobe_{amd64,386,other}.{go,s} + linux_kernel{,_other}.go)
      # selected by GOOS/GOARCH build tags. Passing only `main.go` to
      # `go build` compiles that single file in isolation and fails with
      # "undefined: readSysinfo / cpuBrandStringFromCPUID / ..." because
      # the symbols live in sibling files. `.` is the package directory
      # and pulls in every matching .go/.s file automatically.
      - name: Build Linux amd64
        working-directory: ./client
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o probe-client .
          chmod +x probe-client

      - name: Build Linux arm64
        working-directory: ./client
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o probe-client-arm64 .
          chmod +x probe-client-arm64

      - name: Build macOS amd64
        working-directory: ./client
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o probe-client-darwin-amd64 .
          chmod +x probe-client-darwin-amd64

      - name: Build macOS arm64
        working-directory: ./client
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o probe-client-darwin-arm64 .
          chmod +x probe-client-darwin-arm64

      - name: Build Windows amd64
        working-directory: ./client
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o probe-client.exe .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-binaries
          path: |
            client/probe-client
            client/probe-client-arm64
            client/probe-client-darwin-amd64
            client/probe-client-darwin-arm64
            client/probe-client.exe
          retention-days: 30

      - name: Commit binaries to client folder
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add client/probe-client client/probe-client-arm64 \
                  client/probe-client-darwin-amd64 client/probe-client-darwin-arm64 \
                  client/probe-client.exe
          if ! git diff --staged --quiet; then
            if git diff --staged --name-only | grep -qE '^client/(probe-client|probe-client-arm64|probe-client-darwin-amd64|probe-client-darwin-arm64|probe-client\.exe)$'; then
              git commit -m "chore: update client binaries [skip actions]"
              git push
            fi
          fi

      - name: Upload to Release
        if: (github.event_name == 'workflow_call' && inputs.tag != '') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            client/probe-client
            client/probe-client-arm64
            client/probe-client-darwin-amd64
            client/probe-client-darwin-arm64
            client/probe-client.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

