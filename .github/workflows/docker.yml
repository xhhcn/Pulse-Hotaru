name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.3.3)'
        required: true
        type: string

env:
  DOCKERHUB_USERNAME: xhh1128
  IMAGE_NAME: xhh1128/pulse

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Determined tag: $TAG, version: $VERSION"

      - name: Check if server files exist
        id: check_server_files
        run: |
          if git ls-tree -r --name-only HEAD | grep -qE '^(server/|docker/|Dockerfile)'; then
            echo "server_files_exist=true" >> $GITHUB_OUTPUT
            echo "Server files found"
          else
            echo "server_files_exist=false" >> $GITHUB_OUTPUT
            echo "No server files found, skipping"
          fi

      - name: Set up QEMU
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Client builds only require Go 1.15, but we use 1.22 to match
          # the server toolchain and allow rebuilding anything in-repo.
          go-version: '1.22'

      - name: Build Client Binaries
        # Build the whole client package (`.`), not `main.go` alone.
        # The client has been split into main.go + hwprobe_*.go/.s +
        # linux_kernel{,_other}.go (selected by GOOS/GOARCH build tags),
        # so single-file builds fail with "undefined: readSysinfo" etc.
        run: |
          cd client
          echo "Building client binaries..."
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o probe-client .
          chmod +x probe-client
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o probe-client-arm64 .
          chmod +x probe-client-arm64
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o probe-client-darwin-amd64 .
          chmod +x probe-client-darwin-amd64
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o probe-client-darwin-arm64 .
          chmod +x probe-client-darwin-arm64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o probe-client.exe .
          echo "Client binaries built successfully"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release v${{ steps.version.outputs.version }}
          files: |
            client/probe-client
            client/probe-client-arm64
            client/probe-client-darwin-amd64
            client/probe-client-darwin-arm64
            client/probe-client.exe
            client/install.sh
          body: |
            ## 🚀 Release v${{ steps.version.outputs.version }}

            ### ✨ New Features

            **One-click Migration & Backup**
            - New `scripts/migrate.sh`, `scripts/backup.sh`, and `scripts/restore.sh` for zero-downtime migration between hosts using hot bbolt snapshots
            - Admin dashboard now exposes a "Download Backup" button that streams a consistent `metrics.db` snapshot via the server API
            - Server-side `/api/admin/backup` endpoint with Bearer-auth, path-safe streaming, and audit logging
            - `migrate.sh` self-bootstraps `backup.sh` / `restore.sh` on the remote host, preserves inherited `PASSWORD` / `TOKEN` env vars instead of leaking via argv, and ships a rescue path on restore failure

            **macOS Client Parity**
            - Full Apple Silicon and Intel Mac support with accurate CPU model, core counts, nominal frequency, memory, swap, disk, and network metrics
            - Reworked installer uses the modern `launchctl bootstrap` / `bootout` APIs (replacing deprecated `load` / `unload`)
            - OS reporting now includes the macOS product version (e.g. `macOS 14.4`)

            **UI Polish & Accessibility**
            - Cross-fade auth/login overlay with `pointer-events: none` during fade so the dashboard is interactive immediately
            - Refined stagger animations, column-width stability during the waterfall entrance, reduced-motion support, and glassmorphism theme parity
            - SEO/metadata pass: accurate `description`, `robots: noindex, nofollow` (instances are private), `theme-color` (dark/light), Open Graph, Twitter card, apple-touch-icon, and a `/robots.txt` that disallows indexing by default

            ### 🔧 Fixes & Hardening

            - **Server static cache**: standalone binary now emits the same `Cache-Control` headers as the Docker/Nginx build, so binary-only deployments don't serve stale HTML after an upgrade
            - **macOS metrics under `CGO_ENABLED=0`**: CPU / memory / swap no longer report zero on Darwin builds
            - **Linux client build**: split into `hwprobe_*.go/.s` + `linux_kernel{,_other}.go` for correct per-arch compilation (workflows now build the package `.`, not a single file)
            - **Docker / binary caching parity**: `docker/nginx.conf` emits `Cache-Control: no-cache` for HTML and long-lived caching for hashed assets; the standalone server replicates this
            - **Admin / index auth flow**: privacy-disabled, valid-token, invalid-token, no-token, and config-failure paths verified against a jsdom harness (9/9 scenarios)
            - **Security**: stdin-only password prompts, `0600` DB permissions after restore, Bearer-only admin API, audit-logged backup downloads, and explicit warnings when falling back to plaintext HTTP during migration

            ### 📦 Docker Images
            - `xhh1128/pulse:${{ steps.version.outputs.version }}`
            - `xhh1128/pulse:latest`

            ### 📥 Downloads

            **Client binaries**
            | Platform | File |
            |----------|------|
            | Linux amd64 | `probe-client` |
            | Linux arm64 | `probe-client-arm64` |
            | macOS Intel (amd64) | `probe-client-darwin-amd64` |
            | macOS Apple Silicon (arm64) | `probe-client-darwin-arm64` |
            | Windows amd64 | `probe-client.exe` |
            | Install Script (Linux + macOS) | `install.sh` |

            **Server standalone binaries** (uploaded by the standalone workflow)
            | Platform | File |
            |----------|------|
            | Linux amd64 | `pulse-server-standalone-linux-amd64` |
            | Linux arm64 | `pulse-server-standalone-linux-arm64` |

            **Quick Install (Linux & macOS):**
            ```bash
            curl -sSL https://raw.githubusercontent.com/xhhcn/Pulse/main/client/install.sh | sudo bash -s -- --id YOUR_ID --server http://YOUR_SERVER:8080
            ```

            **One-click migration to a new host:**
            ```bash
            PASSWORD="$OLD_ADMIN_PW" TOKEN="$NEW_ADMIN_PW" \
              bash scripts/migrate.sh --from https://old.example.com --to https://new.example.com
            ```
          draft: false
          prerelease: false
