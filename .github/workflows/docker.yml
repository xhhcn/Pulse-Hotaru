name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.3.3)'
        required: true
        type: string

env:
  DOCKERHUB_USERNAME: xhh1128
  IMAGE_NAME: xhh1128/pulse

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Determined tag: $TAG, version: $VERSION"

      - name: Check if server files exist
        id: check_server_files
        run: |
          if git ls-tree -r --name-only HEAD | grep -qE '^(server/|docker/|Dockerfile)'; then
            echo "server_files_exist=true" >> $GITHUB_OUTPUT
            echo "Server files found"
          else
            echo "server_files_exist=false" >> $GITHUB_OUTPUT
            echo "No server files found, skipping"
          fi

      - name: Set up QEMU
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Client Binaries
        run: |
          cd client
          echo "Building client binaries..."
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o probe-client main.go
          chmod +x probe-client
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o probe-client-arm64 main.go
          chmod +x probe-client-arm64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o probe-client.exe main.go
          echo "Client binaries built successfully"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release v${{ steps.version.outputs.version }}
          files: |
            client/probe-client
            client/probe-client-arm64
            client/probe-client.exe
            client/install.sh
          body: |
            ## 🚀 Release v${{ steps.version.outputs.version }}

            ### ✨ New Features

            **Push Mode (NAT / Outbound-only Support)**
            - Clients behind NAT or without inbound ports now proactively push metrics every 3 seconds
            - Server automatically detects push-mode clients and skips inbound polling for them
            - TCPing is executed locally on push-mode clients; results are included in each push payload
            - Server responds to each push with the latest TCPing configuration for immediate propagation

            **Public IP Detection for NAT Clients**
            - Client now prioritizes external API lookups (ipinfo.io and others) in parallel to obtain the correct egress/public IP
            - Server-side NAT IP fixup: if the reported IP is private or empty, the real remote IP from the HTTP request is used for geolocation
            - Both mechanisms ensure accurate country detection for NAT and outbound-only machines

            **Real-time SSE Broadcast for Push Clients**
            - Server immediately broadcasts an SSE event after receiving a push, making the frontend update near-instantly (< 3 s) instead of waiting for the next polling cycle

            ### 🔧 Bug Fixes & Stability

            **Registration Conflict on IP Change Fixed**
            - Removed the IP/port comparison that caused HTTP 409 errors when a client legitimately re-registered with a different IP
            - Client identity is now validated solely by ID + secret, allowing seamless reconnection after IP changes

            **Concurrency & Data Race Fixes**
            - `ClientRegistry.GetAll` now returns value copies instead of raw pointers, eliminating data races between the polling loop and concurrent registry writes
            - `pollClient` uses `UpdateWorkingURL` for atomic updates instead of modifying potentially stale local copies
            - `ClientRegistry.Register` preserves `PushMode`, `LastPushAt`, and `Secret` when a client re-registers, preventing false offline detections
            - Push offline detection threshold raised to 30 s to tolerate network jitter with the 8 s push timeout

            **Client-side Reliability**
            - Fixed critical bug where `resp.Body.Close()` was called before reading the body in `startPeriodicRegistration`, preventing TCPing config from ever updating
            - TCPing results are restored to the pending queue on transient push failures to prevent data loss
            - Dedicated `pushHTTPClient` with 8 s timeout prevents the push loop from blocking on slow responses
            - Periodic re-registration interval reduced from 5 s to 60 s (push loop already maintains liveness)

            ### 📦 Docker Images
            - `xhh1128/pulse:${{ steps.version.outputs.version }}`
            - `xhh1128/pulse:latest`

            ### 📥 Client Downloads
            | Platform | File |
            |----------|------|
            | Linux amd64 | `probe-client` |
            | Linux arm64 | `probe-client-arm64` |
            | Windows amd64 | `probe-client.exe` |
            | Install Script | `install.sh` |

            **Quick Install:**
            ```bash
            curl -sSL https://raw.githubusercontent.com/xhhcn/Pulse/main/client/install.sh | sudo bash -s -- --id YOUR_ID --server http://YOUR_SERVER:8008
            ```
          draft: false
          prerelease: false
