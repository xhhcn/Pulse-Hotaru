name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.3.2)'
        required: true
        type: string

env:
  DOCKERHUB_USERNAME: xhh1128
  IMAGE_NAME: xhh1128/pulse

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Determined tag: $TAG, version: $VERSION"

      - name: Check if server files exist
        id: check_server_files
        run: |
          if git ls-tree -r --name-only HEAD | grep -qE '^(server/|docker/|Dockerfile)'; then
            echo "server_files_exist=true" >> $GITHUB_OUTPUT
            echo "Server files found"
          else
            echo "server_files_exist=false" >> $GITHUB_OUTPUT
            echo "No server files found, skipping"
          fi

      - name: Set up QEMU
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.check_server_files.outputs.server_files_exist == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Client Binaries
        run: |
          cd client
          echo "Building client binaries..."
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o probe-client main.go
          chmod +x probe-client
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o probe-client-arm64 main.go
          chmod +x probe-client-arm64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o probe-client.exe main.go
          echo "Client binaries built successfully"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release v${{ steps.version.outputs.version }}
          files: |
            client/probe-client
            client/probe-client-arm64
            client/probe-client.exe
            client/install.sh
          body: |
            ## 🚀 Release v${{ steps.version.outputs.version }}

            ### ✨ New Features

            **Traffic Display Toggle**
            - New toggle in Customization Settings to show/hide real-time and total traffic info
            - Displays inbound/outbound speed and total transfer in system detail dropdown
            - Smart placeholders: shows "-" when no data, actual values when online

            **Glassmorphism Effect**
            - Frosted glass UI effect toggle in Customization Settings
            - Full dark/light theme adaptation with carefully tuned transparency, blur, and saturation
            - Minimalist design: subtle borders, no shadows, consistent visual depth

            **Client Auto-Update**
            - Install script now includes automatic update via systemd timer (default: daily)
            - SHA256 checksum comparison to only update when binary changes
            - ELF binary validation to prevent corrupted updates
            - Configurable interval: `--update-interval daily|weekly|hourly`
            - Disable with `--no-auto-update`

            **Backend & Client Optimizations**
            - Cached static metrics (OS info, location) with `sync.Once` to reduce CPU
            - IP address detection with 60s TTL cache and `sync.RWMutex`
            - Replaced `fmt.Sscanf` with `strconv.ParseUint` for faster `/proc` parsing
            - Fixed `time.After` timer leak in server polling with `time.NewTimer`
            - Simplified HTTP dialer and removed dead code

            **UI Refinements**
            - Fixed filter search icon visibility in light mode
            - Improved filter icon/text alignment and spacing
            - Fixed TCPing chart top/bottom spacing consistency
            - Removed detail/TCPing divider line for cleaner look
            - Journal log rate limiting for service logging

            ### 📦 Docker Images
            - `xhh1128/pulse:${{ steps.version.outputs.version }}`
            - `xhh1128/pulse:latest`

            ### 📥 Client Downloads
            | Platform | File |
            |----------|------|
            | Linux amd64 | `probe-client` |
            | Linux arm64 | `probe-client-arm64` |
            | Windows amd64 | `probe-client.exe` |
            | Install Script | `install.sh` |

            **Quick Install:**
            ```bash
            curl -sSL https://raw.githubusercontent.com/xhhcn/Pulse/main/client/install.sh | sudo bash -s -- --id YOUR_ID --server http://YOUR_SERVER:8008
            ```
          draft: false
          prerelease: false
